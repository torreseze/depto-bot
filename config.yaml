# Configuración del bot de búsqueda de departamentos.
# Los secretos (token de Telegram, chat id) NO van acá: van por variables
# de entorno / GitHub Secrets. Ver README.

filtros:
  precio_max: 600000          # ARS
  precio_tolerancia: 50000    # acepta hasta precio_max + esto (deptos al límite)
  precio_min: 0               # ARS
  moneda: "ARS"               # solo se consideran avisos en esta moneda
  ambientes_min: 2
  dormitorios_min: 1
  dormitorios_max: 1          # solo deptos de 1 dormitorio (excluye 2+)
  zonas:
    - "Nueva Córdoba"
    - "Güemes"
    - "Centro"
  m2_min: 40
  excluir_palabras:
    - "temporario"
    - "temporal"
    - "estudiantes"
  # Si un aviso no expone un dato (ej: m2 o dormitorios no aparecen en el
  # listado), strict_unknown=false lo deja pasar igual. Ponelo en true para
  # ser estricto y descartar todo lo que no se pueda verificar.
  strict_unknown: false

# Fuentes habilitadas. Empezamos solo con La Voz (la más estable).
# Las demás se van sumando por fase (ver README).
fuentes:
  lavoz:
    enabled: true
    # Barrios a buscar (ids de location de La Voz):
    #   Nueva Córdoba=5034 · Centro=4910 · Güemes=4958
    # (más barrios en scrapers/lavoz.py -> BARRIOS, o agregalos acá)
    location_ids: [5034, 4910, 4958]
    # Filtro de dormitorios en el server (vacío = todos). Valores válidos:
    #   "1 Dormitorio" · "2 Dormitorios" · "3 Dormitorios" · "Monoambiente" · "4 Dormitorios o más"
    cantidad_dormitorios: ["1 Dormitorio"]
    max_paginas: 0            # 0 = todas las páginas de tus zonas (recomendado)
    hard_cap_paginas: 80      # tope de seguridad
  argenprop:
    enabled: false
  zonaprop:
    enabled: false
  facebook:
    enabled: false

# Comportamiento del reporte
reporte:
  # Si no hay nuevos, igual manda mensaje y vuelve a listar los vigentes.
  enviar_si_no_hay_nuevos: true
  # Tope de avisos a listar por reporte (si hay más, muestra "...y N más").
  max_listar: 20
