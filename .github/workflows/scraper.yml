name: depto-bot

on:
  schedule:
    # GitHub Actions usa UTC. Córdoba es UTC-3.
    # 6h–22h AR  ==  9h–23h + 0h,1h UTC  -> una corrida por hora.
    - cron: "0 9-23,0,1 * * *"
  workflow_dispatch: {}   # permite correrlo a mano desde la pestaña Actions

# Necesario para commitear el estado (state.json) de vuelta al repo.
permissions:
  contents: write

concurrency:
  group: depto-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Guardar estado (dedup)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/state.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "chore: actualizar estado de avisos vistos [skip ci]"
            git push
          fi
