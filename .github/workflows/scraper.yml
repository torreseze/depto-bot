name: depto-bot

on:
  # PAUSADO (2026-07: ya encontraron depto). Para reactivar, descomentá el schedule.
  # schedule:
  #   # GitHub Actions usa UTC. Córdoba es UTC-3.
  #   # 6h–22h AR  ==  9h–23h + 0h,1h UTC  -> una corrida por hora.
  #   - cron: "0 9-23,0,1 * * *"
  workflow_dispatch: {}   # permite correrlo a mano desde la pestaña Actions

# Necesario para commitear el estado (state.json) de vuelta al repo.
permissions:
  contents: write

concurrency:
  group: depto-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Guardar estado (dedup)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/state.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "chore: actualizar estado de avisos vistos [skip ci]"
            # La rama puede haberse movido mientras corría: rebase + reintento.
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                echo "Estado guardado."
                exit 0
              fi
              echo "push rechazado, reintento $i..."
              sleep 5
            done
            echo "No se pudo guardar el estado tras varios intentos." >&2
            exit 1
          fi
